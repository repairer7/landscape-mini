name: Test Image (ESXi)

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Build workflow run ID (leave empty for latest)"
        default: ""

jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - variant: default
          - variant: docker
          - variant: alpine
          - variant: alpine-docker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass socat curl qemu-utils qemu-system-x86 ovmf

      # ---------------------------
      # 下载构建产物（img）
      # ---------------------------
      - name: Download image from build artifacts
        uses: actions/download-artifact@v4
        with:
          name: landscape-mini-x86-${{ matrix.variant }}
          path: output/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.inputs.run_id || '' }}
        continue-on-error: true
        id: download-same-run

      - name: Download latest image (fallback)
        if: steps.download-same-run.outcome == 'failure'
        uses: dawidd6/action-download-artifact@v6
        with:
          name: landscape-mini-x86-${{ matrix.variant }}
          path: output/
          workflow: ci.yml
          search_artifacts: true

      - name: List downloaded files
        run: ls -lh output/

      # ---------------------------
      # 转换为 ESXi 可用 VMDK
      # ---------------------------
      - name: Convert IMG to ESXi VMDK
        run: |
          IMG_FILE=$(ls output/*.img | head -n 1)
          echo "Found image: $IMG_FILE"

          # ESXi 需要 streamOptimized 格式
          qemu-img convert -p -f raw -O vmdk \
            -o subformat=streamOptimized,compat6 \
            "$IMG_FILE" output/landscape-mini-${{ matrix.variant }}.vmdk

          ls -lh output/

      # ---------------------------
      # 使用 VMDK 运行测试
      # ---------------------------
      - name: Run health checks (${{ matrix.variant }})
        run: |
          ./tests/test-auto.sh output/*.vmdk

      - name: Run E2E network tests (${{ matrix.variant }})
        run: ./tests/test-e2e.sh output/*.vmdk

      # ---------------------------
      # 上传测试日志
      # ---------------------------
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.variant }}
          path: output/test-logs/
          retention-days: 7
